<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>form tng</title>
  <style>
    fieldset{
      border: 2px solid black
    }
  </style>
</head>
<body>
  <h1>회원가입을 환영합니다</h1>

  <form action="" method="get">
    <fieldset>
      <legend>사용자 정보</legend>

      <ul>
        <li>
          <label for="id">아이디 </label>
          <input 
            type="text" 
            required id="id" 
            minlength="4" 
            maxlength="10" 
            placeholder="4자 ~ 10자 사이, 공백 없이"
          >
        </li>
        <li>
          <label for="email">이메일</label>
          <input 
            type="email" 
            name="email" 
            id="email"
            required
          >
        </li>
        <li>
          <label for="pw">비밀번호 </label>
          <input 
            type="password" 
            name="pw" 
            id="pw" 
            placeholder="문자와 숫자, 특수 기호 포함"
          >
        </li>
        <li>
          <label for="pwcheck">비밀번호 확인</label>
          <input 
            type="password" 
            name="pwcheck" 
            id="pwcheck"
          >
        </li>
        <li>
          <label for="path">가입 경로 </label>
          <select name="path" id="path">
            <option value="0">인터넷</option>
            <option value="1">지인</option>
            <option value="2" selected>기타</option>
          </select>
        </li>
        <li>
          <label for="memo">메모</label>
          <textarea 
            name="memo" 
            id="memo" 
            placeholder="남길 말씀이 있다면 여기에" 
            cols="40" 
            rows="10"
          ></textarea>
        </li>
      </ul>
    </fieldset>

    <fieldset>
      <legend>이벤트와 새로운 소식</legend>

      <div>
      <input type="radio" name="event" id="su">
      <label for="su">메일 수신</label>
      <input type="radio" name="event" id="nsu" checked>
      <label for="nsu">메일 수신 안 함</label>
      </div>
    </fieldset>

    <button type="submit">가입하기</button>
    <button type="reset">취소</button>
  </form>
</body>
</html>

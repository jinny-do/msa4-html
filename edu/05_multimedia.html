<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>multimedia Tag</title>
</head>
<body>
  <!-- 멀티미디어 : 음성, 동영상 -->

  <!-- audio 태그 : 웹 문서에 소리 콘텐츠를 삽입 -->
   <audio src="./video.mp4" controls></audio>

   <!-- video 태그 : 웹 문서에 비디오 콘텐츠를 삽입 -->
    <video src="./video.mp4" controls width="200px" poster="./cat1.jpg" muted ></video>
</body>
</html>

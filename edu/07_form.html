<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>form Tag</title>
</head>
<body>
  <!-- form 태그 : 유저가 입력한 정보를 제출하기 위하여 범위를 지정하는 태그 -->
  <!-- action은 바로 백엔드 서버의 '어떤 기능'을 호출할지 정해주는 통로 -->
  <form action="" method="get">

    <!-- fieldset 태그 : 여러 컨트롤과 레이벨을 묶을 때 사용하는 태그 -->
    <fieldset>
    <!-- legend 태그 : 필드셋 태그의 콘텐츠를 설명하는 태그 -->
    <legend>로그인 폼</legend>
    <!-- input 태그 : 데이터를 입력 받을 수 있는 태그 -->
    <!-- label 태그 : 입력받은 필드를 설명할 때 사용하는 태그 
         input 태그의 id 속성값과 label 태그의 for 속성값이 동일하게 연결 가능 
         required : 필수입력 필드로 지정한다 -->
    <input type="text" readonly value="미리 넣어둔 값" name="readonly" >
    <br>
    <label for="account">ID : </label>
    <input type="text" id="account" minlength="2" maxlength="5" placeholder="아이디를 입력해 주세요." required >
    <br>
    <label for="password">PW : </label>
    <input type="password" id="password">
    <br><br>
    <!-- textarea 태그 : 여러 줄을 입력하는 텍스트 영역을 만드는 태그 -->
    <label for="info">기타 </label>
    <br>
    <textarea name="info" id="info" cols="30" rows="5" placeholder="여기에 입력해주세요"></textarea>
    <br>
    <!-- select 태그 : 드롭다운 목록을 만드는 태그 -->
    <!-- option 태그 : 드롭다운의 리스트를 만드는 태그 
          - value 속성 : 서버로 넘겨줄 값을 지정하는 속성 
          - selected 속성 : 초기에 선택되어 보여질 항목을 지정 -->
    <select name="rice" id="rice">
      <option value="bab">밥</option>
      <option value="donggas">돈까스</option>
      <option value="sushi" selected>초밥</option>
    </select>
    </fieldset>

    <!-- button 태그 : 버튼을 만들어주는 태그 -->
    <button type="submit">전송</button>
    <button type="reset">초기화</button>
    <button type="button">버튼</button>
    <br>
    <!-- 기타 input의 타입 -->
    <label for="email">Email : </label>
    <input type="email" name="email" id="email">
    <br>
    <label for="number">Number : </label>
    <input type="number" name="number" id="number" min="0" max="5">
    <br>
    <label for="range">Ranage : </label>
    <input type="range" name="range" id="range" min="0" max="10">
    <br>
    <label for="date">Date : </label>
    <input type="date" name="date" id="date">
    <br>
    <!-- checkbox 유의사항 : name을 이용하여 그룹화 하기 때문에 name을 일치시켜줘야한다. -->
    <label for="banana">Banana</label>
    <input type="checkbox" name="fruits" id="banana" checked>
    <label for="sb">Strawberry</label>
    <input type="checkbox" name="fruits" id="sb">
    <br>
    <!-- radio 유의사항 : name을 이용하여 그룹화 하기 때문에 name을 일치시켜줘야한다. -->
    <label for="hamberger">Hamberger</label>
    <input type="radio" name="foods" id="hamberger" checked>
    <label for="dubbab">Dubbab</label>
    <input type="radio" name="foods" id="dubbab">

    <!-- hidden : 화면의 폼에는 보이지 않지만 사용자가 입력을 마치면 함께 서버로 전송되는 속성값 -->
    <input type="hidden" name="hiddenTest" value="내가 보내줄 값">
  </form>
</body>
</html>

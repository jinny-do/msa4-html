<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>form Tag</title>
</head>
<body>
  <!-- form 태그 : 유저가 입력한 정보를 제출하기 위하여 범위를 지정하는 태그 -->
  <!-- action은 바로 백엔드 서버의 '어떤 기능'을 호출할지 정해주는 통로예요. -->
  <form action="" method="get">
    <!-- input 태그 : 데이터를 입력 받을 수 있는 태그 -->
    <input type="text" maxlength="5" placeholder="아이디를 입력해 주세요.">

  
  </form>
</body>
</html>
